<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Registration form</h2>
    <form action="/register" method="post">
        <label for="username">Name:</label>
        <input type="text" id ="username" name="name">

        <p>Gender:</p>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age"><br>
        <br>
        <label for="qual">Qualification:</label>
        <input type="text" id="qual" name="qual"><br>
        <br>
        <label for="str">Stream:</label>
        <select name="stream" id="str">
            <option value="Electrical">Electrical</option>
            <option value="Mechanical">Mechanical</option>
            <option value="CSIT">CSIT</option>
            <option value="Civil">Civil</option>
            <option value="Data Science">Data Science</option>
        </select><BR>
        <br>
        <label for="add">Address:</label>
        <textarea name="address" id="add"></textarea><br>

        <br>
        <input type="submit" value="Submit"><!--triggers post method , all values entered in inputs gets stored in backend variable-->



    </form>
    
</body>
</html>
